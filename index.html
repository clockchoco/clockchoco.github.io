<!DOCTYPE html>
<html>
<head>
<title>One True Layout</title>
<style>
    input{
        margin:5em 20em;
        margin-bottom: 5em;
        width:20em;
        font-size:25px;
    }
    div.container div div:hover{
        background-color: aqua;
    }
    div.container div div:active{
        box-shadow: rgba(50, 50, 93, 0.25) 0px 30px 60px -12px inset, rgba(0, 0, 0, 0.3) 0px 18px 36px -18px inset;
    }
    div.container {
        margin:auto;
        width:76.8em;
    }
    div.container div{
        background-color:black;
        display:grid;
        grid-template-columns: repeat(40,1fr);
        padding:0px 1px;
    }
    div.container div div{
        white-space:nowrap;
        font-size:15px;
        width: 4em;
        height:3.5em;
        color:white;
        background-color: gray;
        margin-top:2px;
        margin-left:2px;
        padding:2px;
    }
    div.row1 div:nth-child(15){
        width:6em;
    }
    div.row1 div:nth-child(16){
        margin-left:9px;
    } 
    div.row2 div:first-child{
        width:6em;
    }
    div.row2 div:nth-child(16){
        margin-left:9px;
    }
    div.row3 div:first-child{
        width:8em;
    }
    div.row3 div:nth-child(13){
        width:10.8em;
    }
    div.row3 div:nth-child(14){
        margin-left:9px;
    }
    div.row4 div:first-child{
        width:10.3em;
    }
    div.row4 div:nth-child(13){
        width:8.5em;
    }
    div.row4 div:nth-child(14){
        margin-left:9px;
    }
    div.row5 div:nth-child(5){
        width:9.38em;
    }
    div.row5 div:nth-child(6){
        width:11.7em;
    }
    div.row5 div:nth-child(7){
        width:6.1em;
    }
    div.row5 div:nth-child(13){
        margin-left:9px;
    }
    div.row5 div{
        margin-bottom: 2px;
    }


    /* <!--https://codepen.io/bhadupranjal/pen/vYLZYqQ--> */
    a{
    position: relative;
    display: inline-block;
    padding: 25px 30px;
    margin: 0 0 0 35em;
    top:5em;
    color: black;
    font-size:larger;
    font-weight: bold;
    font-family: cursive;
    text-decoration: none;
    text-transform: uppercase;
    transition: 0.5s;
    letter-spacing: 4px;
    overflow: hidden;
    margin-right: 50px;
    }
    /* copilet code */
    #overlay {
            position: fixed;
            display: none;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: red;
            opacity: 0;
            transition: opacity 1s;
            z-index: 2;
            cursor: pointer;
        
}
a:hover{
    background: #d0f403;
    color: #050801;
    box-shadow: 0 0 5px #d0f403,
                0 0 25px #d0f403,
                0 0 50px #d0f403,
                0 0 200px #d0f403;
     -webkit-box-reflect:below 1px linear-gradient(transparent, #0005);
}
a:nth-child(1){
    filter: hue-rotate(270deg);
}
a:nth-child(2){
    filter: hue-rotate(110deg);
}
a span{
    position: absolute;
    display: block;
}
a span:nth-child(1){
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg,transparent,#d0f403);
    animation: animate1 1s linear infinite;
}
@keyframes animate1{
    0%{
        left: -100%;
    }
    50%,100%{
        left: 100%;
    }
}
a span:nth-child(2){
    top: -100%;
    right: 0;
    width: 2px;
    height: 100%;
    background: linear-gradient(180deg,transparent,#d0f403);
    animation: animate2 1s linear infinite;
    animation-delay: 0.25s;
}
@keyframes animate2{
    0%{
        top: -100%;
    }
    50%,100%{
        top: 100%;
    }
}
a span:nth-child(3){
    bottom: 0;
    right: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(270deg,transparent,#d0f403);
    animation: animate3 1s linear infinite;
    animation-delay: 0.50s;
}
@keyframes animate3{
    0%{
        right: -100%;
    }
    50%,100%{
        right: 100%;
    }
}


a span:nth-child(4){
    bottom: -100%;
    left: 0;
    width: 2px;
    height: 100%;
    background: linear-gradient(360deg,transparent,#d0f403);
    animation: animate4 1s linear infinite;
    animation-delay: 0.75s;
}
@keyframes animate4{
    0%{
        bottom: -100%;
    }
    50%,100%{
        bottom: 100%;
    }
}
</style>

</head>
<body>
    <div id="overlay"></div>
    <a href="#" id="superReset">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        초기화 버튼
    </a>
    <input id="saramisseo">
    <div class="container">
        <div class="row1">
            <div>Esc</div><div>`</div><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div><div>7</div><div>8</div><div>9</div><div>0</div><div>-</div><div>=</div><div id="backspace">Back<br>space</div>
            <div>Home</div><div>PageUp</div><div>탐색</div>
        </div>
        <div class="row2">
            <div class="tab">tab</div><div>q</div><div>w</div><div>e</div><div>r</div><div>t</div><div>y</div><div>u</div><div>i</div><div>o</div><div>p</div><div>[</div><div>]</div><div>\</div><div>Del</div>
            <div>End</div><div>Page<br>Down</div><div>위로</div>
        </div>
        <div class="row3">
            <div>Caps</div><div>a</div><div>s</div><div>d</div><div>f</div><div>g</div><div>h</div><div>j</div><div>k</div><div>l</div><div>;</div><div>'
            </div><div>Enter</div><div>Insert</div><div>Pause</div><div>아래로</div>
        </div>
        <div class="row4">
            <div>Shift</div><div id="test">z</div><div>x</div><div>c</div><div>v</div><div>b</div><div>n</div><div>m</div><div>,</div><div>.</div><div>/</div><div>↑</div><div>Shift</div>
            <div>PrtScn</div><div>ScrLk</div><div>고정</div>
        </div>
        <div class="row5">
            <div>Func</div><div>Ctrl</div><div>Window</div><div>Alt</div><div>한자</div><div></div><div>한/영</div><div>Alt</div><div>←</div><div>↓</div><div>→</div><div>문서</div>
            <div>옵션</div><div>도움말</div><div>투명</div>
        </div>
    
    </div>
    <script>
        const keys = document.querySelectorAll('.container div div');
        const test = document.getElementById('saramisseo');
        const reset = document.getElementById('superReset');
        for (const key of keys){
            key.addEventListener('click',(e)=>{
                // test.insertAdjacentText('beforeend',key.textContent);
                test.value += key.textContent;
            });
            window.addEventListener('keydown',(e)=>{
                if(e.key === 'Enter'){
                    reset.click();
                    key.style.backgroundColor='black';
                    setTimeout(()=>{
                    key.style.backgroundColor='gray';
                    },100);
                    return;
                }
                if(e.key === key.textContent){
                    key.style.backgroundColor='black';
                    setTimeout(()=>{
                    key.style.backgroundColor='gray';
                    },100);
                    key.click();
                }

            })
        }

        //<!--  copilot zone -->
        document.getElementById('superReset').addEventListener('click', function() {
            
            let overlay = document.getElementById('overlay');
            overlay.style.display = 'block';
            setTimeout(function() {
                overlay.style.opacity = 1;
            }, 20);
            setTimeout(function() {
                overlay.style.opacity = 0;
            }, 1000);
            setTimeout(function() {
                overlay.style.display = 'none';
                test.value = '';
            }, 1000);
            
        });

    </script>
</body>
    </html>
