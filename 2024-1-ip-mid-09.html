<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <form action="#" method="GET">
            <h1>인하대 컴퓨터공학과 홈페이지 회원가입</h1>
            <h2>필수 정보</h2>
            <h3>이메일</h3>
            <input type="email" placeholder="E-mail" name="email">
            <input type="button" value="형식 체크">
            <h3>패스워드</h3>
            <input type="password" placeholder="Password" name="passwd1">
            <h3>패스워드 재입력</h3>
            <input type="password" placeholder="Password(Repeat)" name="passwd2">
            <h3>이름</h3>
            <input type="test" placeholder="Name" name="username">
            <h3>성별</h3>
            <input type="radio" id="man" name="gender" value="m">
            <label for="man">남자 (Man)</label>
            <input type="radio" id="woman" name="gender" value="w">
            <label for="woman">여자 (Woman)</label>
            <h3>분류</h3>
            <select name class>
                <option value="u">학사과정 (Undergraduate)</option>
                <option value="m">석사과정 (Master Student)</option>
                <option value="p">박사/통합과정 (Ph.D. Student)</option>
                <option value="f">교직원 (Faculty/Staff)</option>
                <option value="s">학부모 (Student Parent)</option>
                <option value="g">일반인 (General)</option>
            </select>
            <button type="submit">정보 제출</button>
        </form>
    </body>
</html>
