<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>TEST1</title>
        <style>
            button:hover{
                background-color: red;
                color:beige
            }   
        </style>
        <script>
            const loginBtn = document.getElementById('loginBtn');
            const id = document.getElementById('inputId');
            const password = document.getElementById('inputPassword');
            loginBtn.addEventListener('click',(e)=>{
                e.preventDefault();
                localStorage.setItem("id", id.value);
                localStorage.setItem("password", password.value);
            })


            const output = document.querySelector('output');

            const outputBtn = document.getElementById('outputBtn');
            outputBtn.addEventListener('click',(e)=>{
                e.preventDefault();
                const id1 = localStorage.getItem('id');
                const ps1 = localStorage.getItem('password');
            })
        </script>
    </head>
    <body>
        <form>
            <label for="text">아이디를 입력하세요.</label>
            <input type="text" placeholder="아이디" id="inputId"><br>   
            <label for="text">비밀번호를 입력하세요.</label>
            <input type="text" placeholder="비밀번호" id="inputPassword"><br>
            <button id="loginBtn">입력하기</button>
        </form>
        <br><br><br><br><br><br><br>
        <div class="output">
            <button id="outputBtn">저장된 정보 보기</button>
        </div>
    </body>
</html>
