    <script>

            loginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (id.value === '') {
                    alert('아이디를 입력해주세요!!');
                    return;
                }
                if (password.value === '') {
                    alert('비밀번호를 입력해주세요!!');

                }
                if (localStorage.getItem('id') === id.value && localStorage.getItem('password') === password.value) {
                    location.href = 'login_success.html'
                }
                else {
                    alert('잘못된 아이디 또는 패스워드!!');
                    id.value = '';
                    password.value = '';
                }

            })


            const output = document.querySelector('output');

            const outputBtn = document.getElementById('outputBtn');
            outputBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const id1 = localStorage.getItem('id');
                const ps1 = localStorage.getItem('password');
                const newDiv = document.createElement('div');

            });
        }
    </script>
</head>

<body>
